name: Create Market (NYC + Boston)

on:
  schedule:
    # 1 PM ET — 17:00 UTC = 1 PM EDT / 12 PM EST, well after NYISO and ISO-NE DAM
    # prices publish (~11 AM ET) and aligned with the post-1 PM RT signal window.
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  create-market:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/create-market
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/create-market" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cron failed with HTTP $status"
            exit 1
          fi
