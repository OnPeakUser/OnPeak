name: Create Market (NYC + Boston)

on:
  schedule:
    # 11:30 AM ET — 15:30 UTC works for EDT (UTC-4); in EST (UTC-5) this is 10:30 AM,
    # which is still after NYISO and ISO-NE DAM prices publish (~11 AM ET).
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  create-market:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/create-market
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/create-market" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cron failed with HTTP $status"
            exit 1
          fi
