name: Settle Market

on:
  schedule:
    # 12:05 AM ET — 05:05 UTC = 1:05 AM EDT / 12:05 AM EST, safely after midnight ET.
    - cron: "5 5 * * *"
  workflow_dispatch:

jobs:
  settle-market:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/settle-market
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/settle-market" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cron failed with HTTP $status"
            exit 1
          fi
